<section class="min-h-screen bg-[#F9FAFB] px-4 py-12 sm:px-6 lg:px-8">
  <div class="mx-auto flex max-w-6xl flex-col overflow-hidden rounded-3xl border border-gray-200 bg-white shadow-sm lg:flex-row">
    <div class="flex-1 p-8 sm:p-10 lg:p-12">
      <div class="mb-4 inline-flex items-center rounded-full border border-[#F59E0B]/20 bg-[#F59E0B]/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-[#F59E0B]">
        Catégorie
      </div>
      <h1 class="text-3xl font-black uppercase tracking-tight text-[#111827] sm:text-4xl">
        {{ nom }}
      </h1>
      <p class="mt-4 max-w-2xl text-base leading-relaxed text-gray-600">
        {{ description }}
      </p>
      <div class="mt-6 flex flex-wrap items-center gap-4 text-sm text-gray-500">
        <span class="rounded-full bg-gray-100 px-3 py-1 font-medium">
          {{ nombreProduits }} produits
        </span>
      </div>
    </div>

    <div class="flex items-center justify-center bg-gradient-to-br from-[#111827] via-[#1F2937] to-[#374151] p-6 sm:p-8 lg:min-h-[320px] lg:w-[360px]">
      <img
        *ngIf="imageUrl"
        [src]="imageUrl"
        [alt]="nom"
        class="h-56 w-full rounded-2xl object-cover shadow-lg"
      />
      <div
        *ngIf="!imageUrl"
        class="flex h-56 w-full items-center justify-center rounded-2xl border border-white/10 bg-white/10 text-sm font-semibold uppercase tracking-[0.3em] text-white/80"
      >
        Aucune image
      </div>
    </div>
  </div>
</section>
