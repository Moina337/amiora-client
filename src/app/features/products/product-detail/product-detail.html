@if (product) {
  <div class="max-w-6xl mx-auto px-4 py-6 sm:py-10">

      <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10">

      <!-- GALERIE (image simple pour l'instant) -->
      <div class="relative aspect-square bg-gray-100 rounded-2xl overflow-hidden">
        <img [src]="product.imageUrl" [alt]="product.nom"
          class="w-full h-full object-cover" />

        <div class="absolute top-3 left-3">
          <app-product-badges [badges]="badges" size="lg"></app-product-badges>
        </div>

        <div class="absolute top-3 right-3">
          <app-favorite-button
            [isFavorite]="isFavorite"
            size="lg"
            (toggle)="onFavorite()">
          </app-favorite-button>
        </div>
      </div>

      <!-- INFOS -->
      <div>
        <p class="text-xs sm:text-sm uppercase tracking-wider text-gray-400">
          {{ product.categorie }}
        </p>

        <h1 class="mt-2 text-2xl sm:text-3xl font-bold text-gray-900">
          {{ product.nom }}
        </h1>
         
        @if (vendeur) {
          
  <a [routerLink]="['/boutique', vendeur.slug]"

    class="inline-flex items-center gap-2 mt-2 text-sm text-gray-500 hover:text-amber-600 transition">
    <img [src]="vendeur.logoUrl" [alt]="vendeur.nom" class="w-5 h-5 rounded-full object-cover">
    Vendu par <span class="font-medium">{{ vendeur.nom }}</span>
  </a>
}

        <div class="mt-3">
          <app-product-rating [nombreAvis]="24" size="lg"></app-product-rating>
        </div>

        <div class="mt-5">
          <app-product-price
            [displayedPrice]="displayedPrice"
            [originalPrice]="product.prix"
            [hasPromotion]="hasPromotion"
            size="lg">
          </app-product-price>
        </div>

        <div class="mt-5">
  <p class="text-sm sm:text-base text-gray-600 leading-relaxed"
    [class.line-clamp-3]="!descriptionEtendue">
    {{ product.description }}
  </p>

  @if (product.description.length > 150) {
    <button (click)="descriptionEtendue = !descriptionEtendue"
      class="mt-1 text-sm font-medium text-amber-600 hover:text-amber-700 transition">
      {{ descriptionEtendue ? 'Voir moins' : 'Voir plus' }}
    </button>
  }
</div>

        <!-- Quantité -->
        <div class="mt-6 flex items-center gap-4">
          <span class="text-sm font-medium text-gray-700">Quantité</span>
          <div class="flex items-center border border-gray-300 rounded-xl">
            <button (click)="decreaseQuantite()"
              class="w-9 h-9 flex items-center justify-center hover:bg-gray-100 transition">
              −
            </button>
            <span class="w-10 text-center font-medium">{{ quantite }}</span>
            <button (click)="increaseQuantite()"
              class="w-9 h-9 flex items-center justify-center hover:bg-gray-100 transition">
              +
            </button>
          </div>
        </div>

        <!-- Bouton panier -->
        <div class="mt-6">
  <app-add-to-cart-button size="lg" (addToCart)="onAddToCart()"></app-add-to-cart-button>
</div>
      </div>

    </div>

    <!-- Produits similaires -->
    <div class="mt-12 sm:mt-16">
      <app-product-section
        title="Produits similaires"
        subtitle="Vous pourriez aussi aimer"
        [products]="produitsSimilaires"
        containerClass="">
      </app-product-section>
    </div>

  </div>
} @else {
  <div class="max-w-6xl mx-auto px-4 py-20 text-center text-gray-500">
    Produit introuvable.
  </div>
}
