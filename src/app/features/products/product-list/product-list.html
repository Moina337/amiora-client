<section class="max-w-7xl mx-auto px-4 py-10">

    <!-- Titre -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">
            Nos Produits
        </h1>
        <p class="text-gray-500 mt-2">
            Découvrez notre sélection de produits.
        </p>
    </div>

    <!-- Barre d'outils -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-8">
        <div class="flex flex-col lg:flex-row gap-4">

            <select
                [(ngModel)]="categorieSelectionnee"
                (ngModelChange)="onCategorieChange()"
                class="border rounded-lg px-4 py-3 lg:w-64">
                <option value="">Toutes les catégories</option>
                @for (categorie of categories; track categorie) {
                    <option [value]="categorie">{{ categorie }}</option>
                }
            </select>

            <select
                [(ngModel)]="triSelectionne"
                (ngModelChange)="onTriChange()"
                class="border rounded-lg px-4 py-3 lg:w-64">
                <option value="recent">Plus récent</option>
                <option value="prix-asc">Prix croissant</option>
                <option value="prix-desc">Prix décroissant</option>
                <option value="ventes">Meilleures ventes</option>
            </select>

        </div>
    </div>

    <!-- Résultat -->
    <div class="flex justify-between items-center mb-6">
        <p class="text-sm text-gray-500">
            {{ produitsFiltres.length }} produits
        </p>
    </div>

    <!-- Grille -->
    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
        @for (product of products; track product.id) {
            <app-product-card [product]="product"></app-product-card>
        }
    </div>

    <!-- Pagination -->
    @if (totalPages > 1) {
        <div class="flex justify-center items-center gap-2 mt-12">

            <button
                (click)="allerALaPage(pageActuelle - 1)"
                [disabled]="pageActuelle === 1"
                class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-300 hover:bg-gray-100 transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white">
                ‹
            </button>

            @for (page of pages; track page) {
                <button
                    (click)="allerALaPage(page)"
                    class="w-9 h-9 flex items-center justify-center rounded-lg border text-sm font-medium transition"
                    [class.bg-amber-500]="page === pageActuelle"
                    [class.text-white]="page === pageActuelle"
                    [class.border-amber-500]="page === pageActuelle"
                    [class.border-gray-300]="page !== pageActuelle"
                    [class.hover:bg-gray-100]="page !== pageActuelle">
                    {{ page }}
                </button>
            }

            <button
                (click)="allerALaPage(pageActuelle + 1)"
                [disabled]="pageActuelle === totalPages"
                class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-300 hover:bg-gray-100 transition disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white">
                ›
            </button>

        </div>
    }

</section>
