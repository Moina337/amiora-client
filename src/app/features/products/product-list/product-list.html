<section class="max-w-7xl mx-auto px-4 py-10">

    <!-- Titre -->

    <div class="mb-8">

        <h1 class="text-3xl font-bold text-gray-900">

            Nos Produits

        </h1>

        <p class="text-gray-500 mt-2">

            Découvrez notre sélection de produits.

        </p>

    </div>

    <!-- Barre d'outils -->

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-8">

        <div class="flex flex-col lg:flex-row gap-4">

            <input
                type="text"
                placeholder="Rechercher un produit..."
                class="flex-1 border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-amber-400">

            <select class="border rounded-lg px-4 py-3">

                <option>Toutes les catégories</option>

            </select>

            <select class="border rounded-lg px-4 py-3">

                <option>Plus récent</option>
                <option>Prix croissant</option>
                <option>Prix décroissant</option>
                <option>Meilleures ventes</option>

            </select>

        </div>

    </div>

    <!-- Résultat -->

    <div class="flex justify-between items-center mb-6">

        <p class="text-sm text-gray-500">

            {{ products.length }} produits

        </p>

    </div>

    <!-- Grille -->

    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">

        @for(product of products; track product.id){

         <app-product-card [product]="product"></app-product-card>

        }

    </div>

    <!-- Pagination -->

    <div class="flex justify-center mt-12">

        <button
            class="px-5 py-2 rounded-lg border">

            Voir plus

        </button>

    </div>

</section>
