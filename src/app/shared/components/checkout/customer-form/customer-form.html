<div class="bg-white rounded-2xl border border-gray-200 p-4 sm:p-6">

    <h2 class="text-lg sm:text-xl font-bold text-gray-900">
        Informations de livraison
    </h2>

    <form class="mt-4 sm:mt-6 space-y-4" [formGroup]="customerForm">

        <!-- Nom complet -->
        <div>
            <label class="block text-xs sm:text-sm font-medium mb-1.5">Nom complet *</label>
            <input type="text" formControlName="nomComplet"
                class="w-full rounded-xl border border-gray-300 px-3 sm:px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
        </div>

        <!-- Téléphone -->
        <div>
            <label class="block text-xs sm:text-sm font-medium mb-1.5">Téléphone *</label>
            <input type="tel" placeholder="+269 ..." formControlName="telephone"
                class="w-full rounded-xl border border-gray-300 px-3 sm:px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
        </div>

        <!-- Île + Ville -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs sm:text-sm font-medium mb-1.5">Île *</label>
                <select formControlName="ile"
                    class="w-full rounded-xl border border-gray-300 px-3 sm:px-4 py-2.5 text-sm">
                    <option value="">Choisir</option>
                    <option>Ngazidja</option>
                    <option>Anjouan</option>
                    <option>Mohéli</option>
                </select>
            </div>
            <div>
                <label class="block text-xs sm:text-sm font-medium mb-1.5">Ville *</label>
                <input formControlName="ville"
                    class="w-full rounded-xl border border-gray-300 px-3 sm:px-4 py-2.5 text-sm">
            </div>
        </div>

        <!-- Quartier -->
        <div>
            <label class="block text-xs sm:text-sm font-medium mb-1.5">Quartier *</label>
            <input formControlName="quartier"
                class="w-full rounded-xl border border-gray-300 px-3 sm:px-4 py-2.5 text-sm">
        </div>

        <!-- Instructions de livraison -->
        <div>
            <label class="block text-xs sm:text-sm font-medium mb-1.5">Instructions de livraison</label>
            <textarea rows="2" formControlName="commentaire"
                placeholder="Ex : maison bleue à côté de la mosquée..."
                class="w-full rounded-xl border border-gray-300 px-3 sm:px-4 py-2.5 text-sm resize-none">
            </textarea>
        </div>

    </form>
</div>
