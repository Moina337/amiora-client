<section [class]="containerClass" *ngIf="products?.length; else emptyState">
  <div class="flex items-end justify-between mb-6">
    <div>
      <h2 class="text-xs font-bold uppercase tracking-widest text-[#111827]">{{ title }}</h2>
      <p class="text-[11px] text-gray-400 mt-0.5" *ngIf="subtitle">{{ subtitle }}</p>
    </div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-10">
    <div *ngFor="let product of products" class="group relative flex flex-col justify-between">
      <div class="aspect-[3/4] w-full overflow-hidden rounded-xl bg-gray-50 relative">
        <img [src]="product.imageUrl" [alt]="product.nom" class="w-full h-full object-cover transform group-hover:scale-101 transition-transform duration-300 ease-out">
        <span *ngIf="badgeText" class="absolute top-3 left-3 text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded" [class]="badgeClass">{{ badgeText }}</span>
        <button class="absolute bottom-3 left-3 right-3 bg-white/95 backdrop-blur-sm text-[#111827] py-2.5 rounded-lg text-[10px] font-bold uppercase tracking-wider opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-all duration-200 shadow-sm">
          Ajout Rapide
        </button>
      </div>
      <div class="mt-4 flex justify-between items-start gap-2">
        <div>
          <h3 class="text-xs font-medium text-gray-800 hover:text-[#F59E0B] transition-colors">
            <a href="#">{{ product.nom }}</a>
          </h3>
          <p class="mt-0.5 text-[11px] text-gray-400" *ngIf="priceMode === 'default'">{{ metaText }}</p>
          <p class="mt-0.5 text-[11px] text-amber-500 font-medium tracking-wide" *ngIf="priceMode === 'sales'">{{ product.nombreVentes }} vendus</p>
          <p class="mt-0.5 text-[11px] text-gray-400" *ngIf="priceMode === 'promotion'">Promotion active</p>
        </div>
        <div class="text-right whitespace-nowrap" *ngIf="priceMode === 'promotion'">
          <p class="text-xs font-bold text-[#EF4444]">{{ product.prixPromotion }} FCFA</p>
          <p class="text-[10px] text-gray-400 line-through mt-0.5">{{ product.prix }} FCFA</p>
        </div>
        <p class="text-xs font-bold text-[#111827] whitespace-nowrap" *ngIf="priceMode !== 'promotion'">{{ product.prix }} FCFA</p>
      </div>
    </div>
  </div>
</section>

<ng-template #emptyState>
  <p>{{ emptyMessage }}</p>
</ng-template>
