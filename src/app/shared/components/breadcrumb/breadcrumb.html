<nav class="flex items-center flex-wrap gap-1 text-xs sm:text-sm text-gray-500 mb-4 sm:mb-6">
  @for (item of items; track item.label; let last = $last) {
    @if (item.url && !last) {
      <a [routerLink]="item.url" class="hover:text-amber-600 transition">
        {{ item.label }}
      </a>
      <span class="text-gray-300">/</span>
    } @else {
      <span class="text-gray-900 font-medium line-clamp-1">
        {{ item.label }}
      </span>
    }
  }
</nav>
