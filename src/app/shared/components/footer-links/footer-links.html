<div>

    <h3 class="text-white font-semibold text-lg mb-5">

        {{ title }}

    </h3>

    <ul class="space-y-3">

        @for(link of links; track link.label){

            <li>

                <a
                    [routerLink]="link.url"
                    class="text-gray-400 hover:text-amber-400 transition-colors duration-200">

                    {{ link.label }}

                </a>

            </li>

        }

    </ul>

</div>
